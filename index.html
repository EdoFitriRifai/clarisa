<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Struk Bluetooth Thermal</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    background:#2196F3;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#1976D2;
}

.preview{
    background:#eee;
    padding:10px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<div class="container">

<h2>Cetak Struk Bluetooth Thermal</h2>

<label>Nama Toko</label>
<input type="text" id="store" value="Clarisa">

<label>Item</label>
<textarea id="items" rows="5">Geprek Pedas x1 15000
Es Teh x2 10000</textarea>

<label>Total</label>
<input type="number" id="total" value="25000">

<button onclick="connectPrinter()">
Hubungkan Printer
</button>

<button onclick="printReceipt()">
Cetak Struk
</button>

<h3>Preview</h3>
<div class="preview" id="preview"></div>

</div>

<script>

let printerCharacteristic;

function generateReceipt(){

    const store = document.getElementById('store').value;
    const items = document.getElementById('items').value;
    const total = document.getElementById('total').value;

    return `
${store}
==============================
${items}
------------------------------
TOTAL : Rp ${Number(total).toLocaleString('id-ID')}
==============================

Terima Kasih

`;
}

function updatePreview(){
    document.getElementById('preview').innerText = generateReceipt();
}

updatePreview();

document.querySelectorAll("input,textarea")
.forEach(el=>{
    el.addEventListener("input",updatePreview);
});

async function connectPrinter(){

    try{

        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices:true,
            optionalServices:[
                '000018f0-0000-1000-8000-00805f9b34fb'
            ]
        });

        const server = await device.gatt.connect();

        const service = await server.getPrimaryService(
            '000018f0-0000-1000-8000-00805f9b34fb'
        );

        printerCharacteristic =
            await service.getCharacteristic(
                '00002af1-0000-1000-8000-00805f9b34fb'
            );

        alert("Printer Terhubung");

    }catch(err){
        alert("Gagal koneksi : " + err);
        console.error(err);
    }
}

async function printReceipt(){

    if(!printerCharacteristic){
        alert("Hubungkan printer terlebih dahulu");
        return;
    }

    try{

        const encoder = new TextEncoder();

        const ESC = '\x1B';
        const GS = '\x1D';

        let data =
            ESC + '@' +
            ESC + 'a' + '\x01' +
            generateReceipt() +
            '\n\n\n' +
            GS + 'V' + '\x41' + '\x03';

        await printerCharacteristic.writeValue(
            encoder.encode(data)
        );

        alert("Struk berhasil dicetak");

    }catch(err){
        console.error(err);
        alert("Gagal cetak");
    }
}

</script>

</body>
</html>
